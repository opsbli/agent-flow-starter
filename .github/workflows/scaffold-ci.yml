name: agent-flow scaffold checks

on:
  push:
    branches: [main, master, develop]
    paths:
      - "agent-flow/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/scaffold-ci.yml"
  pull_request:
    paths:
      - "agent-flow/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/scaffold-ci.yml"
  workflow_dispatch:

jobs:
  scaffold-health:
    name: Scaffold Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run scaffold-health.sh
        id: health
        run: |
          start=$(date +%s%N)
          bash agent-flow/scripts/scaffold-health.sh
          end=$(date +%s%N)
          echo "duration_ms=$(( (end - start) / 1000000 ))" >> $GITHUB_OUTPUT

      - name: Run manifest-check.sh
        id: manifest
        run: |
          start=$(date +%s%N)
          bash agent-flow/scripts/manifest-check.sh
          end=$(date +%s%N)
          echo "duration_ms=$(( (end - start) / 1000000 ))" >> $GITHUB_OUTPUT

      - name: Run template-check.sh
        id: template
        run: |
          start=$(date +%s%N)
          bash agent-flow/scripts/template-check.sh
          end=$(date +%s%N)
          echo "duration_ms=$(( (end - start) / 1000000 ))" >> $GITHUB_OUTPUT

      - name: Performance Baseline Summary
        run: |
          echo "## Gate Performance Baseline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Duration (ms) | Threshold (ms) | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------------|----------------|--------|" >> $GITHUB_STEP_SUMMARY
          threshold=5000
          health_duration="${{ steps.health.outputs.duration_ms }}"
          manifest_duration="${{ steps.manifest.outputs.duration_ms }}"
          template_duration="${{ steps.template.outputs.duration_ms }}"
          write_row() {
            gate="$1"
            dur="$2"
            [ -z "$dur" ] && dur="N/A"
            if [ "$dur" != "N/A" ] && [ "$dur" -gt "$threshold" ] 2>/dev/null; then
              status="EXCEEDS"
            else
              status="OK"
            fi
            echo "| $gate | ${dur}ms | ${threshold}ms | ${status} |" >> $GITHUB_STEP_SUMMARY
            [ "$dur" != "N/A" ] && bash agent-flow/scripts/_collect-baseline.sh --gate "$gate" --duration-ms "$dur" 2>/dev/null || true
          }
          write_row "health-check" "$health_duration"
          write_row "manifest-check" "$manifest_duration"
          write_row "template-check" "$template_duration"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Threshold: 5s per gate. Alert if consistently exceeded._" >> $GITHUB_STEP_SUMMARY

  smoke-test-ps1:
    name: Smoke Test (PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run new-change smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & "agent-flow/test/test-scripts/test-new-change.ps1"

      - name: Run next-step unit tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & "agent-flow/test/test-scripts/test-next-step.ps1"

      - name: Run gate smoke tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & "agent-flow/test/test-scripts/test-gate-smoke.ps1"

      - name: Run check-change integration test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & "agent-flow/test/test-scripts/test-check-change.ps1"

  smoke-test-sh:
    name: Smoke Test (Bash)
    runs-on: ubuntu-latest
    needs: scaffold-health
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y sed grep coreutils

      - name: Run new-change smoke test
        run: bash agent-flow/test/test-scripts/test-new-change.sh

      - name: Run next-step unit tests
        run: bash agent-flow/test/test-scripts/test-next-step.sh

      - name: Run gate smoke tests
        run: bash agent-flow/test/test-scripts/test-gate-smoke.sh

      - name: Run check-change integration test
        run: bash agent-flow/test/test-scripts/test-check-change.sh

  syntax-check:
    name: Syntax Check All Scripts
    runs-on: ubuntu-latest
    needs: scaffold-health
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax for all .sh scripts
        run: |
          failed=0
          for script in agent-flow/scripts/*.sh agent-flow/test/test-scripts/*.sh; do
            if ! bash -n "$script"; then
              echo "SYNTAX ERROR: $script"
              failed=1
            fi
          done
          if [ $failed -ne 0 ]; then
            exit 1
          fi
          echo "All .sh scripts syntax OK"

      - name: Check PowerShell syntax for all .ps1 scripts
        shell: pwsh
        run: |
          $failed = 0
          Get-ChildItem -Path agent-flow/scripts -Filter *.ps1 | ForEach-Object {
              try {
                  $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$null)
              } catch {
                  Write-Host "SYNTAX ERROR: $_"
                  $failed = 1
              }
          }
          Get-ChildItem -Path agent-flow/test/test-scripts -Filter *.ps1 | ForEach-Object {
              try {
                  $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$null)
              } catch {
                  Write-Host "SYNTAX ERROR: $_"
                  $failed = 1
              }
          }
          if ($failed -ne 0) { exit 1 }
          Write-Host "All .ps1 scripts syntax OK"

  file-consistency:
    name: Cross-Platform File Consistency
    runs-on: ubuntu-latest
    needs: scaffold-health
    steps:
      - uses: actions/checkout@v4

      - name: Check ps1/sh parity
        run: |
          failed=0
          for ps1 in agent-flow/scripts/*.ps1; do
            base=$(basename "$ps1" .ps1)
            sh="agent-flow/scripts/${base}.sh"
            if [ ! -f "$sh" ]; then
              echo "MISSING .sh counterpart for: $ps1"
              failed=1
            fi
          done
          for sh in agent-flow/scripts/*.sh; do
            base=$(basename "$sh" .sh)
            ps1="agent-flow/scripts/${base}.ps1"
            if [ ! -f "$ps1" ]; then
              echo "MISSING .ps1 counterpart for: $sh"
              failed=1
            fi
          done
          if [ $failed -ne 0 ]; then
            exit 1
          fi
          echo "All script pairs have both .ps1 and .sh"

  pair-consistency:
    name: Pair Consistency Check (advisory)
    runs-on: ubuntu-latest
    needs: scaffold-health
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Check ps1/sh script pair consistency
        run: |
          bash agent-flow/scripts/pair-consistency-check.sh --threshold 30 || true
          echo "pair-consistency-check is advisory — CI continues regardless of result."

  static-analysis:
    name: Static Analysis (shellcheck)
    runs-on: ubuntu-latest
    needs: scaffold-health
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on agent-flow scripts
        run: |
          echo "## ShellCheck Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          warning_count=0
          for script in agent-flow/scripts/*.sh agent-flow/test/test-scripts/*.sh; do
            if [ ! -f "$script" ]; then continue; fi
            result="$(shellcheck --severity=warning --format=gcc "$script" 2>&1)" || true
            if [ -n "$result" ]; then
              issue_count=$(echo "$result" | wc -l)
              warning_count=$((warning_count + issue_count))
              echo "**$script**: $issue_count warning(s)" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$result" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "| Gate | Warnings | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| shellcheck | $warning_count | — (non-blocking) | INFO |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_shellcheck ran in non-blocking mode (continue-on-error: true). Review warnings above._" >> $GITHUB_STEP_SUMMARY

  static-analysis-actionlint:
    name: Static Analysis (actionlint)
    runs-on: ubuntu-latest
    needs: scaffold-health
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl -sS https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Run actionlint on GitHub workflow files
        run: |
          echo "## actionlint Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ! command -v actionlint &>/dev/null; then
            echo "actionlint could not be installed." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          issue_count=0
          for wf in .github/workflows/*.yml; do
            [ -f "$wf" ] || continue
            result="$(actionlint --format='{{range $}}{{println .}}' "$wf" 2>&1)" || true
            if [ -n "$result" ]; then
              issues=$(echo "$result" | wc -l)
              issue_count=$((issue_count + issues))
              echo "**$wf**: $issues issue(s)" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$result" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "| Gate | Issues | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| actionlint | $issue_count | — (non-blocking) | INFO |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_actionlint ran in non-blocking mode (continue-on-error: true). Review issues above._" >> $GITHUB_STEP_SUMMARY

  performance-baseline:
    name: Gate Performance Baseline
    runs-on: ubuntu-latest
    needs: scaffold-health
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Check gate performance baselines
        run: |
          echo "## Gate Performance Baseline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Duration (ms) | Threshold (ms) | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------------|----------------|--------|" >> $GITHUB_STEP_SUMMARY
          threshold=5000
          total=0
          degraded=0
          for gate in scaffold-health manifest-check template-check; do
            start=$(date +%s%N)
            bash "agent-flow/scripts/${gate}.sh" >/dev/null 2>&1 || true
            end=$(date +%s%N)
            duration=$(( (end - start) / 1000000 ))
            total=$((total + 1))
            if [ "$duration" -gt "$threshold" ]; then
              status="⚠️ EXCEEDS"
              degraded=$((degraded + 1))
            else
              status="✅ OK"
            fi
            echo "| ${gate}.sh | ${duration}ms | ${threshold}ms | ${status} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Threshold: ${threshold}ms per gate. Degraded: ${degraded}/${total}_" >> $GITHUB_STEP_SUMMARY

  static-analysis-ps1:
    name: Static Analysis (PSScriptAnalyzer)
    runs-on: windows-latest
    needs: scaffold-health
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber

      - name: Run PSScriptAnalyzer on agent-flow scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $warningCount = 0
          $results = Invoke-ScriptAnalyzer -Path agent-flow/scripts,agent-flow/test/test-scripts -Recurse -Severity Warning -ErrorAction SilentlyContinue
          if ($results) {
            $warningCount = @($results).Count
            "## PSScriptAnalyzer Results" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            $results | Group-Object ScriptName | ForEach-Object {
              $scriptName = $_.Name
              $count = $_.Count
              "**$scriptName**: $count warning(s)" >> $env:GITHUB_STEP_SUMMARY
            }
            "" >> $env:GITHUB_STEP_SUMMARY
          }
          "| Gate | Warnings | Threshold | Status |" >> $env:GITHUB_STEP_SUMMARY
          "|------|----------|-----------|--------|" >> $env:GITHUB_STEP_SUMMARY
          "| PSScriptAnalyzer | $warningCount | — (non-blocking) | INFO |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "_PSScriptAnalyzer ran in non-blocking mode (continue-on-error: true). Review warnings above._" >> $env:GITHUB_STEP_SUMMARY

  starter-self-test-linux:
    name: Starter Self-Test (Linux)
    runs-on: ubuntu-latest
    needs: scaffold-health
    steps:
      - uses: actions/checkout@v4

      - name: Run starter self-test with machine gates
        run: bash scripts/test-starter.sh

      - name: Run gate fixture tests
        run: bash scripts/test-gate-fixtures.sh

  starter-self-test-windows:
    name: Starter Self-Test (Windows)
    runs-on: windows-latest
    needs: scaffold-health
    steps:
      - uses: actions/checkout@v4

      - name: Run starter self-test with machine gates
        shell: pwsh
        run: .\scripts\test-starter.ps1

      - name: Run gate fixture tests
        shell: pwsh
        run: .\scripts\test-gate-fixtures.ps1

  unit-tests-ps1:
    name: Unit Tests (Pester)
    runs-on: windows-latest
    needs: scaffold-health
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester unit tests for _common.ps1
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-Pester agent-flow/test/unit/test-common.ps1

      - name: Run Pester unit tests for alignment-check
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-Pester agent-flow/test/unit/test-alignment-check.ps1

      - name: Run Pester unit tests for task-check
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-Pester agent-flow/test/unit/test-task-check.ps1

  unit-tests-bats:
    name: Unit Tests (Bats)
    runs-on: ubuntu-latest
    needs: scaffold-health
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run bats unit tests for _common.sh
        run: bats agent-flow/test/unit/test-common.bats

      - name: Run bats unit tests for alignment-check
        run: bats agent-flow/test/unit/test-alignment-check.bats

      - name: Run bats unit tests for task-check
        run: bats agent-flow/test/unit/test-task-check.bats

  gate-negative-tests:
    name: Gate Negative Tests
    runs-on: ubuntu-latest
    needs: scaffold-health
    steps:
      - uses: actions/checkout@v4

      - name: Verify alignment-check fails without alignment section
        run: |
          mkdir -p /tmp/neg-test/change
          cat > /tmp/neg-test/change/CHANGE.md <<'EOF'
## Flow Level

- [ ] Emergency
- [ ] Light
- [x] Standard
- [ ] Heavy
EOF
          cat > /tmp/neg-test/change/DESIGN.md <<'EOF'
# Design

No alignment section here.
## Plan
EOF
          if bash agent-flow/scripts/alignment-check.sh --change-dir /tmp/neg-test/change 2>/dev/null; then
            echo "FAIL: alignment-check should have failed without alignment section"
            exit 1
          fi
          echo "PASS: alignment-check correctly rejected missing alignment section"

      - name: Verify task-check fails without AC ids
        run: |
          mkdir -p /tmp/neg-task/change
          cat > /tmp/neg-task/change/CHANGE.md <<'EOF'
## Flow Level

- [x] Light
- [ ] Standard
- [ ] Heavy
- [ ] Emergency
EOF
          cat > /tmp/neg-task/change/TASKS.md <<'EOF'
| Task ID | Status | AC | Read Files | Write Files | Verify | Parallel |
|---------|--------|----|-----------|-------------|--------|----------|
| T-01 | pending | | README.md | src/file.ts | echo ok | no |
EOF
          if bash agent-flow/scripts/task-check.sh --change-dir /tmp/neg-task/change 2>/dev/null; then
            echo "FAIL: task-check should have failed without AC ids"
            exit 1
          fi
          echo "PASS: task-check correctly rejected missing AC ids"

      - name: Verify blocked-check catches dangerous patterns
        run: |
          mkdir -p /tmp/neg-blocked/change
          cat > /tmp/neg-blocked/change/CHANGE.md <<'EOF'
## Flow Level

- [x] Heavy
- [ ] Light
- [ ] Standard
- [ ] Emergency
EOF
          cat > /tmp/neg-blocked/change/TASKS.md <<'EOF'
| Task ID | Status | AC | Read Files | Write Files | Verify | Parallel |
|---------|--------|----|-----------|-------------|--------|----------|
| T-01 | pending | AC-01 | config.yml | src/main.rs | cargo test | no |
EOF
          cat > /tmp/neg-blocked/change/VERIFY.md <<'EOF'
## Blocked Items

- description: bypass_auth_for_production
  reason: Need temporary bypass
EOF
          if bash agent-flow/scripts/blocked-check.sh --change-dir /tmp/neg-blocked/change --project-root /tmp/neg-blocked 2>/dev/null; then
            echo "FAIL: blocked-check should have caught bypass_auth_for_production"
            exit 1
          fi
          echo "PASS: blocked-check correctly rejected dangerous pattern"
