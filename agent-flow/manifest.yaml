project:
  name: agent-flow-starter
  kind: dev-toolkit
  description: >
    A reusable AI-development workflow framework (starter).
    Ships as a scaffold that installs into target application projects.
    Not a traditional backend/frontend app — it is a process + script
    toolkit that enforces code-first, evidence-driven development.
  backend:
    framework: n/a (shell/powershell scripts)
    language: shell, powershell
    build: none (CI-only, see .github/workflows/scaffold-ci.yml)
    root_module: agent-flow
  frontend:
    framework: none
    language: none
    repo: none
    verify_required: false
  database:
    engine: none
  cache:
    engine: none
  auth:
    engine: none

code_map:
  backend_entry:
    - agent-flow
  common:
    - agent-flow/scripts
  business_modules:
    - agent-flow          # core workflow engine (flows/, core/, rules/, templates/)
  quality_modules:
    - agent-flow/scripts  # 64 ps1 + 64 sh validation gates, tools, generators
    - agent-flow/test     # scaffold tests (bats, ps1, fixtures)
    - .github/workflows   # CI: scaffold-health, manifest-check, template-check, smoke tests
  build_files:
    - scripts             # installer / setup-new-pc wrappers
  tests:
    - agent-flow/test
    - tests

change_storage:
  root: agent-flow/changes
  knowledge: agent-flow/knowledge
  decisions: agent-flow/decisions
  reports: agent-flow/reports

risk_rules:
  heavy_if:
    - new_module_or_package
    - schema_change
    - auth_or_permission_change
    - public_api_change
    - state_machine_change
    - cache_or_token_change
    - websocket_or_realtime_change
    - workflow_change
    - cross_repo_frontend_backend
    - deployment_or_production_config
    - production_incident_risk
  destructive_gate:
    delete_lines_gte: 5
    public_contract_change: true
    build_file_change: true
    schema_change: true
  blocked_if:
    - hard_delete_without_approval
    - disable_security_filter
    - bypass_auth_for_production
    - direct_production_data_mutation
    - payment_bypass

verification:
  # This is a dev-toolkit repository. "Tests" here = scaffold self-tests.
  backend_compile: none
  backend_test: none
  module_compile: none
  module_test: none
  frontend_typecheck: none
  frontend_test: none
  frontend_lint: none
  integration_test: none
  api_test: none
  toolkit_selfcheck:
    scaffold_health: agent-flow/scripts/scaffold-health.sh
    manifest_check: agent-flow/scripts/manifest-check.sh
    template_check: agent-flow/scripts/template-check.sh
    gate_smoke_test: agent-flow/test/test-scripts/test-gate-smoke.sh
    next_step_test: agent-flow/test/test-scripts/test-next-step.sh
    new_change_test: agent-flow/test/test-scripts/test-new-change.sh
    check_change_test: agent-flow/test/test-scripts/test-check-change.sh

