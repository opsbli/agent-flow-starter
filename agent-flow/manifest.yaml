project:
  name: agent-flow-starter
  kind: initialized
  backend:
    framework: unknown
    language: unknown
    build: unknown
    root_module: agent-flow-starter
  frontend:
    framework: none
    language: none
    repo: none
  database:
    engine: none (starter)
    sql_paths:
      - (none)
  cache:
    engine: none (starter)
  auth:
    engine: none (starter)

code_map:
  backend_entry:
    - (none - agent-flow-starter has no application code)
  common:
    - agent-flow/scripts/
    - agent-flow/core/
    - agent-flow/rules/
  business_modules:
    - agent-flow/changes/
  build_files:
    - (none - scaffold-only repo)
  tests:
    - agent-flow/test/

change_storage:
  root: agent-flow/changes
  knowledge: agent-flow/knowledge
  decisions: agent-flow/decisions
  reports: agent-flow/reports

risk_rules:
  heavy_if:
    - new_module_or_package
    - schema_change
    - auth_or_permission_change
    - public_api_change
    - state_machine_change
    - cache_or_token_change
    - websocket_or_realtime_change
    - workflow_change
    - cross_repo_frontend_backend
    - deployment_or_production_config
    - production_incident_risk
  destructive_gate:
    delete_lines_gte: 5
    public_contract_change: true
    build_file_change: true
    schema_change: true
  blocked_if:
    # Auto-detectable: static analysis can detect these in TASKS.md write_files or code changes
    - hard_delete_without_approval              # auto: grep for DELETE / DROP / TRUNCATE in SQL
    - disable_security_filter                   # auto: grep for security filter disable calls
    - bypass_auth_for_production                # manual: requires human review
    - direct_production_data_mutation           # manual: requires human review
    - payment_bypass                            # manual: requires human review

verification:
  backend_compile: echo "scaffold-only repo; no backend to compile"
  backend_test: echo "scaffold-only repo; no backend tests"
  module_compile: echo "scaffold-only repo; no modules to compile"
  module_test: echo "scaffold-only repo; no module tests"
  frontend_typecheck: echo "scaffold-only repo; no frontend"
  frontend_test: echo "scaffold-only repo; no frontend tests"
  frontend_lint: echo "scaffold-only repo; no frontend lint"

gates:
  - agent-flow/scripts/init-project.ps1
  - agent-flow/scripts/init-project.sh
  - agent-flow/scripts/install-agent-flow.ps1
  - agent-flow/scripts/install-agent-flow.sh
  - agent-flow/scripts/new-change.ps1
  - agent-flow/scripts/new-change.sh
  - agent-flow/scripts/next-step.ps1
